<script>
        // Simple Interaction logic for the drawer
        const menuBtn = document.querySelector('header .material-symbols-outlined[data-icon="menu"]');
        const drawer = document.getElementById('sideDrawer');
        let drawerOpen = false;

        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            drawerOpen = !drawerOpen;
            if(drawerOpen) {
                drawer.style.transform = 'translateX(0)';
            } else {
                drawer.style.transform = 'translateX(100%)';
            }
        });

        document.addEventListener('click', (e) => {
            if (drawerOpen && !drawer.contains(e.target) && e.target !== menuBtn) {
                drawerOpen = false;
                drawer.style.transform = 'translateX(100%)';
            }
        });

        // Add a subtle parallax effect on scroll for background
        window.addEventListener('scroll', () => {
            const scrolled = window.pageYOffset;
            const city = document.querySelector('.floating-city');
            if(city) city.style.transform = `translateY(${scrolled * 0.3}px)`;
        });
    </script>
