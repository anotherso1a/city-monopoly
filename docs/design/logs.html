<script>
        // Micro-interactions for tactile feel
        document.querySelectorAll('.sticker-hover').forEach(button => {
            button.addEventListener('touchstart', () => {
                button.style.transform = 'translateY(2px) translateX(2px)';
                button.style.boxShadow = '1px 1px 0px 0px rgba(0,0,0,0.1)';
            });
            button.addEventListener('touchend', () => {
                button.style.transform = 'translateY(0) translateX(0)';
                button.style.boxShadow = '4px 4px 0px 0px rgba(0,0,0,0.1)';
            });
        });

        // Subtle parallax effect for the "stickers" on scroll
        window.addEventListener('scroll', () => {
            const frames = document.querySelectorAll('.polaroid-frame');
            const scrolled = window.pageYOffset;
            frames.forEach((frame, index) => {
                const speed = (index + 1) * 0.05;
                const yPos = -(scrolled * speed);
                frame.style.marginTop = `${yPos / 5}px`;
            });
        });
    </script>
