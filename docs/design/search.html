<!DOCTYPE html>
<html lang="zh-CN" style="">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&amp;family=Public+Sans:wght@400;700&amp;family=Space+Mono:wght@400;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@100..900&amp;family=Public+Sans:wght@100..900&amp;family=Space+Mono:wght@100..900&amp;display=swap"
        rel="stylesheet">
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Custom "Ink" Borders & Textures */
        .hand-drawn-border {
            border-style: solid;
            border-width: 2px 1.5px 2.5px 2px;
            border-radius: 4px 8px 3px 6px;
        }

        .hand-drawn-card {
            box-shadow: 4px 4px 0px 0px rgba(54, 47, 36, 0.1);
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }

        .hand-drawn-card:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px 0px rgba(54, 47, 36, 0.1);
        }

        .paper-texture {
            background-color: #fff8f3;
            background-image: radial-gradient(#d5c4ab 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }

        .sticker-header {
            clip-path: polygon(0% 0%, 100% 0%, 98% 100%, 2% 95%);
        }

        .highlighter-bar {
            background: linear-gradient(120deg, rgba(255, 184, 0, 0.3) 0%, rgba(255, 184, 0, 0.3) 100%);
            border-radius: 2px;
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#ede1d0",
                        "surface-container-low": "#fff2e1",
                        "tertiary-container": "#7dceff",
                        "surface-container": "#f9ecdb",
                        "tertiary-fixed-dim": "#81cfff",
                        "on-tertiary-fixed-variant": "#004c6b",
                        "on-tertiary": "#ffffff",
                        "on-background": "#211b11",
                        "primary-container": "#ffb800",
                        "on-error-container": "#93000a",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6",
                        "surface-container-high": "#f3e6d6",
                        "background": "#fff8f3",
                        "on-primary": "#ffffff",
                        "tertiary-fixed": "#c6e7ff",
                        "surface-dim": "#e5d8c8",
                        "primary-fixed": "#ffdea8",
                        "secondary-fixed-dim": "#ffb3b4",
                        "inverse-on-surface": "#fcefde",
                        "on-error": "#ffffff",
                        "tertiary": "#00658d",
                        "secondary": "#b71032",
                        "inverse-surface": "#362f24",
                        "inverse-primary": "#ffba20",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-highest": "#ede1d0",
                        "on-secondary-container": "#fffbff",
                        "on-primary-fixed-variant": "#5e4200",
                        "on-surface-variant": "#514532",
                        "on-surface": "#211b11",
                        "on-tertiary-container": "#00577a",
                        "on-secondary-fixed": "#40000a",
                        "secondary-container": "#da3148",
                        "on-secondary": "#ffffff",
                        "primary-fixed-dim": "#ffba20",
                        "outline": "#837560",
                        "on-primary-fixed": "#271900",
                        "outline-variant": "#d5c4ab",
                        "secondary-fixed": "#ffdad9",
                        "surface-bright": "#fff8f3",
                        "surface": "#fff8f3",
                        "surface-tint": "#7c5800",
                        "primary": "#7c5800",
                        "on-secondary-fixed-variant": "#920023",
                        "on-tertiary-fixed": "#001e2d",
                        "on-primary-container": "#6b4c00"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "4px",
                        "sm": "12px",
                        "safe-area": "24px",
                        "md": "20px",
                        "xl": "48px",
                        "lg": "32px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "body-sm": ["Public Sans"],
                        "data-lg": ["Space Mono"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "label-caps": ["Space Mono"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "headline-lg-mobile": ["Plus Jakarta Sans"],
                        "body-md": ["Public Sans"]
                    },
                    "fontSize": {
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "data-lg": ["18px", { "lineHeight": "24px", "fontWeight": "700" }],
                        "display-lg": ["40px", { "lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "fontWeight": "700" }],
                        "headline-lg": ["28px", { "lineHeight": "36px", "fontWeight": "700" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
                    }
                },
            },
        }
    </script>
</head>

<body class="bg-background text-on-surface paper-texture min-h-screen">

    <main class="max-w-md mx-auto px-safe-area py-6 space-y-6">
        <!-- Search Bar Section (from SCREEN_16 pattern) -->
        <div class="relative group">
            <div
                class="hand-drawn-border border-primary-container bg-surface-container-lowest p-1 flex items-center gap-3 px-4 h-14 shadow-sm">
                <span class="material-symbols-outlined text-outline">search</span>
                <input
                    class="flex-1 bg-transparent border-none focus:ring-0 font-body-md text-on-surface placeholder-outline-variant"
                    placeholder="搜索地标、街道..." type="text" value="武康大楼">
                <button class="text-secondary">
                    <span class="material-symbols-outlined">cancel</span>
                </button>
            </div>
            <!-- Decorative "Tape" element -->
            <div
                class="absolute -top-3 left-1/2 -translate-x-1/2 w-16 h-6 bg-primary-container opacity-40 rotate-1 pointer-events-none">
            </div>
        </div>
        <!-- Search Results List -->
        <section class="space-y-5 pb-12">
            <h2 class="font-label-caps text-label-caps text-outline uppercase tracking-widest px-1">搜索结果 (4)</h2>
            <!-- Result Card 1 -->
            <article
                class="hand-drawn-card hand-drawn-border border-outline bg-surface-container-lowest overflow-hidden cursor-pointer hover:bg-surface-container">

                <div class="p-3 flex flex-col">
                    <div>
                        <div class="flex items-start justify-between">
                            <h3 class="font-headline-lg-mobile text-[18px] text-on-surface leading-tight">武康大楼</h3>
                            <span
                                class="font-label-caps text-[10px] px-2 py-0.5 hand-drawn-border border-secondary text-secondary bg-secondary-fixed rotate-2">地标</span>
                            <span
                                class="font-label-caps text-[10px] px-2 py-0.5 hand-drawn-border border-outline text-on-surface-variant bg-surface-container-low -rotate-1 ml-2">1.2
                                km</span>
                        </div>
                        <p class="font-body-sm text-on-surface-variant mt-1 line-clamp-2">上海著名的历史建筑，因形状像熨斗而闻名。充满了Art
                            Deco风格细节。</p>
                    </div>

                </div>
            </article>
            <!-- Result Card 2 -->
            <article
                class="hand-drawn-card hand-drawn-border border-outline bg-surface-container-lowest overflow-hidden cursor-pointer hover:bg-surface-container">

                <div class="p-3 flex flex-col">
                    <div>
                        <div class="flex items-start justify-between">
                            <h3 class="font-headline-lg-mobile text-[18px] text-on-surface leading-tight">武康路历史街区</h3>
                            <span
                                class="font-label-caps text-[10px] px-2 py-0.5 hand-drawn-border border-tertiary text-tertiary bg-tertiary-fixed -rotate-1">街道</span>
                            <span
                                class="font-label-caps text-[10px] px-2 py-0.5 hand-drawn-border border-outline text-on-surface-variant bg-surface-container-low rotate-2 ml-2">1.8
                                km</span>
                        </div>
                        <p class="font-body-sm text-on-surface-variant mt-1 line-clamp-2">中国历史文化名街，两旁遍布近代历史建筑和梧桐树。</p>
                    </div>

                </div>
            </article>
            <!-- Result Card 3 -->
            <article
                class="hand-drawn-card hand-drawn-border border-outline bg-surface-container-lowest overflow-hidden cursor-pointer hover:bg-surface-container">

                <div class="p-3 flex flex-col">
                    <div>
                        <div class="flex items-start justify-between">
                            <h3 class="font-headline-lg-mobile text-[18px] text-on-surface leading-tight">老麦咖啡馆 (武康)
                            </h3>
                            <span
                                class="font-label-caps text-[10px] px-2 py-0.5 hand-drawn-border border-outline text-on-surface-variant bg-surface-variant rotate-1">店铺</span>
                            <span
                                class="font-label-caps text-[10px] px-2 py-0.5 hand-drawn-border border-outline text-on-surface-variant bg-surface-container-low -rotate-2 ml-2">2.0
                                km</span>
                        </div>
                        <p class="font-body-sm text-on-surface-variant mt-1 line-clamp-2">怀旧风格的知名咖啡馆，位于武康大楼底楼，深受游客喜爱。
                        </p>
                    </div>

                </div>
            </article>
            <!-- Result Card 4 (Dashed variant for less relevant/past results) -->
            <article
                class="hand-drawn-card border-2 border-dashed border-outline-variant bg-surface-container-low opacity-80 cursor-pointer hover:bg-surface-container">

                <div class="p-3 flex flex-col">
                    <div>
                        <div class="flex items-start justify-between">
                            <h3 class="font-headline-lg-mobile text-[18px] text-on-surface-variant leading-tight">宋庆龄故居
                            </h3>
                            <span
                                class="font-label-caps text-[10px] px-2 py-0.5 border-2 border-dashed border-outline-variant text-outline-variant -rotate-2">博物馆</span>
                            <span
                                class="font-label-caps text-[10px] px-2 py-0.5 border-2 border-dashed border-outline-variant text-outline-variant rotate-1 ml-2">2.5
                                km</span>
                        </div>
                        <p class="font-body-sm text-outline mt-1 line-clamp-2">位于淮海中路与武康路交叉口附近，幽静的洋房与花园。</p>
                    </div>

                </div>
            </article>
        </section>
    </main>
    <script>
        // Simple micro-interaction for the search input
        const searchInput = document.querySelector('input');
        searchInput.addEventListener('focus', () => {
            searchInput.parentElement.classList.add('ring-2', 'ring-primary', 'ring-offset-2');
        });
        searchInput.addEventListener('blur', () => {
            searchInput.parentElement.classList.remove('ring-2', 'ring-primary', 'ring-offset-2');
        });

        // Button "Press" simulation via JS for extra tactile feel
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousedown', () => {
                btn.style.transform = 'translate(2px, 2px)';
            });
            btn.addEventListener('mouseup', () => {
                btn.style.transform = '';
            });
            btn.addEventListener('mouseleave', () => {
                btn.style.transform = '';
            });
        });
    </script>


</body>

</html>
