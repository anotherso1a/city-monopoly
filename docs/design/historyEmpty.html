<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport" />
    <title>City Monopoly - Start Your Adventure</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Material Symbols -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&amp;family=Public+Sans:wght@400&amp;family=Space+Mono:wght@700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-container": "#ffb800",
                        "on-secondary-fixed-variant": "#920023",
                        "on-tertiary": "#ffffff",
                        "surface-tint": "#7c5800",
                        "surface-container-low": "#fff2e1",
                        "on-tertiary-container": "#00577a",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed-dim": "#81cfff",
                        "outline-variant": "#d5c4ab",
                        "secondary-fixed-dim": "#ffb3b4",
                        "surface-container-lowest": "#ffffff",
                        "error-container": "#ffdad6",
                        "on-background": "#211b11",
                        "tertiary-fixed": "#c6e7ff",
                        "background": "#fff8f3",
                        "secondary": "#b71032",
                        "on-surface-variant": "#514532",
                        "secondary-container": "#da3148",
                        "on-error-container": "#93000a",
                        "primary": "#7c5800",
                        "on-primary-fixed-variant": "#5e4200",
                        "inverse-primary": "#ffba20",
                        "tertiary-container": "#7dceff",
                        "inverse-on-surface": "#fcefde",
                        "tertiary": "#00658d",
                        "surface-variant": "#ede1d0",
                        "on-tertiary-fixed-variant": "#004c6b",
                        "inverse-surface": "#362f24",
                        "primary-fixed-dim": "#ffba20",
                        "primary-fixed": "#ffdea8",
                        "on-secondary-fixed": "#40000a",
                        "on-secondary-container": "#fffbff",
                        "error": "#ba1a1a",
                        "surface-container-high": "#f3e6d6",
                        "surface-container": "#f9ecdb",
                        "on-primary-fixed": "#271900",
                        "secondary-fixed": "#ffdad9",
                        "surface-dim": "#e5d8c8",
                        "on-surface": "#211b11",
                        "outline": "#837560",
                        "surface-bright": "#fff8f3",
                        "surface-container-highest": "#ede1d0",
                        "on-tertiary-fixed": "#001e2d",
                        "surface": "#fff8f3",
                        "on-primary-container": "#6b4c00",
                        "on-primary": "#ffffff",
                        "on-error": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "md": "20px",
                        "lg": "32px",
                        "xl": "48px",
                        "sm": "12px",
                        "base": "8px",
                        "xs": "4px",
                        "safe-area": "24px"
                    },
                    "fontFamily": {
                        "data-lg": ["Space Mono"],
                        "body-md": ["Public Sans"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "body-sm": ["Public Sans"],
                        "label-caps": ["Space Mono"],
                        "headline-lg-mobile": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "data-lg": ["18px", { "lineHeight": "24px", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "display-lg": ["40px", { "lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "fontWeight": "700" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "headline-lg": ["28px", { "lineHeight": "36px", "fontWeight": "700" }]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }

        body {
            background-color: #fff8f3;
            background-image: radial-gradient(#d5c4ab 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }

        .sketch-border {
            border-style: solid;
            border-width: 2.5px 1.8px 2.2px 2px;
            border-color: #514532;
            border-radius: 4px 8px 3px 6px;
        }

        .hand-drawn-shadow {
            box-shadow: 4px 4px 0px 0px rgba(81, 69, 50, 0.15);
        }

        .press-effect:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px 0px rgba(81, 69, 50, 0.15);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="flex flex-col min-h-screen text-on-surface select-none overflow-x-hidden">

    <!-- Main Canvas -->
    <main class="flex-grow flex flex-col items-center justify-center px-safe-area pt-24 pb-32">
        <div class="w-full max-w-sm flex flex-col items-center text-center space-y-lg animate-in fade-in duration-700">
            <!-- Empty State Illustration -->
            <div class="relative w-full aspect-square max-w-[280px]">
                <div class="absolute inset-0 bg-surface-variant opacity-20 rotate-1 rounded-xl"></div>
                <div
                    class="absolute inset-0 bg-white sketch-border hand-drawn-shadow -rotate-1 flex items-center justify-center overflow-hidden">
                    <img alt="Empty City Map Sketch" class="w-full h-full object-cover opacity-80"
                        data-alt="A beautiful, large hand-drawn sketch of a blank city map laid out on aged, heavy-weight paper. The drawing features irregular, charcoal-like outlines of empty city blocks, winding rivers, and dotted street lines without any buildings or markers yet. The style is charming and whimsical, with ink splashes and pencil marks. The background is a warm cream color with subtle paper grain texture, illuminated by soft morning sunlight from the side."
                        src="https://lh3.googleusercontent.com/aida-public/AB6AXuAVJ30HFhINQChX6l5jlWK9bpgny2N20iBnlV6_fvN1sqG9s-l89Mm8_L9vxfZdTztOuIXaby5OcowkQayTRmVB9x8-GP7wn4urHYdAY7QMZfs8652KdOKcBXWG7jAS-0-tH26ZR6eX5gM1mVSZFn5UtETjpah8KSQqqqpaXLBdhN1eRYCLQYwUXNijpfFlKdu_jog7tb4nBzdFWXLS10B6FVKdP0t8YJPob-faeHQK3wHtrqqk2RPxmaogo_QORwFZTPki3v7_yg" />
                </div>
                <!-- Floating Sticker Accent -->
                <div class="absolute -top-4 -right-4 w-20 h-20 rotate-12 flex items-center justify-center">
                    <div class="bg-primary-container p-2 sketch-border hand-drawn-shadow">
                        <span class="material-symbols-outlined text-primary text-4xl"
                            style="font-variation-settings: 'FILL' 1;">explore</span>
                    </div>
                </div>
            </div>
            <!-- Empty State Text -->
            <div class="space-y-base">
                <h2 class="font-headline-lg-mobile text-headline-lg-mobile text-primary">No maps yet!</h2>
                <p class="font-body-md text-body-md text-on-surface-variant max-w-[240px] mx-auto">
                    Start your adventure by creating one. Your urban empire awaits its first street.
                </p>
            </div>
            <!-- Primary Action -->
            <button
                class="w-full max-w-[260px] bg-primary-container text-on-primary-container py-4 px-lg sketch-border hand-drawn-shadow press-effect flex items-center justify-center gap-base">
                <span class="material-symbols-outlined">add_location_alt</span>
                <span class="font-label-caps text-label-caps tracking-widest uppercase">Create First Map</span>
            </button>
            <!-- Secondary Tip -->
            <div class="flex items-center gap-xs text-on-surface-variant opacity-60">
                <span class="material-symbols-outlined text-sm">info</span>
                <p class="font-body-sm text-body-sm">Maps are based on real-world walks</p>
            </div>
        </div>
    </main>

    <!-- Micro-interactions Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.querySelector('button.bg-primary-container');
            btn.addEventListener('mouseenter', () => {
                btn.style.transform = 'translate(-2px, -2px)';
                btn.style.boxShadow = '6px 6px 0px 0px rgba(81, 69, 50, 0.2)';
            });
            btn.addEventListener('mouseleave', () => {
                btn.style.transform = 'translate(0px, 0px)';
                btn.style.boxShadow = '4px 4px 0px 0px rgba(81, 69, 50, 0.15)';
            });
        });
    </script>
</body>

</html>
