    <style>
        .hand-drawn-border {
            border: 2px solid #514532;
            border-radius: 2px 4px 3px 6px / 4px 3px 6px 2px;
        }

        .sticker-shadow {
            box-shadow: 4px 4px 0px 0px rgba(81, 69, 50, 0.1);
        }

        .paper-texture {
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
        }

        .ink-line {
            border-bottom: 2px solid #514532;
            transform: rotate(-0.5deg);
        }

        .btn-active:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px 0px rgba(81, 69, 50, 0.1);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

    <style>
        body {
            min-height: max(884px, 100dvh);

</head>

<body class="bg-surface font-body-md text-on-surface min-h-screen flex items-center justify-center p-md paper-texture">
    <!-- Modal Backdrop -->
    <div class="fixed inset-0 bg-inverse-surface/60 backdrop-blur-sm z-50 flex items-center justify-center p-md overflow-y-auto"

        <!-- Main Container -->

            <!-- Title Header (Sticker Style) -->
            <div class="bg-primary-container px-lg py-xs hand-drawn-border sticker-shadow -rotate-1 z-10">
                <h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-primary-container">生成分享海报</h1>

            <!-- Poster Preview Card -->

                    </div>
                    <div
                        class="absolute top-md left-md bg-secondary-container text-on-secondary-container px-sm py-xs hand-drawn-border rotate-2">
                        <span class="font-label-caps text-label-caps uppercase">My Urban Journey</span>
                    </div>
                </div>
                <!-- Poster Content -->

                    <!-- Player Identity -->

                                src="https://lh3.googleusercontent.com/aida-public/AB6AXuDBZDtBtLD-bsTqIWhWRIZRUMttoIvv5AQf-xyGXMu-zqNslhcSE4IqJgzWEouQSt8YWdxu3gGKqAKjt0gw5gHlkNAqeE5nXLhkGzzzZY1xgbX9Kg82jU24F3n4LX_Zh0LdZCtywIu5j8cPWJD86oohhtSaLOGcFg-lO17_-TtNzmWMK5s_6hL_y5wxH-6RRqYK5Jt9gh1t_V13Va0fb1nS_I8B-Nle9BI3vZz1WTtkeGA1ArAUbAliNuUgFaQvizQ3nB7An2xqFg" />
                        </div>
                        <div>
                            <p class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface leading-tight">
                                城市漫游者</p>

                    <!-- Statistics Bento Grid -->

                            <span class="material-symbols-outlined text-secondary mb-xs">monetization_on</span>
                            <p class="font-label-caps text-label-caps text-on-surface-variant">获取金币</p>

                        <div class="w-16 h-16 bg-surface-container-lowest hand-drawn-border p-1">

                    保存图片
                </button>
                <button
                    class="w-full bg-surface-container-low text-on-surface-variant py-sm font-body-md text-body-md hand-drawn-border border-dashed flex items-center justify-center gap-sm opacity-80 hover:opacity-100 transition-opacity"

    <!-- Background UI (Just for context) -->
    <main class="w-full max-w-md flex flex-col gap-lg opacity-20 pointer-events-none">
        <header
            class="flex items-center justify-between px-md py-sm w-full bg-background rounded-b-xl border-b-2 border-outline-variant shadow-sm">
            <span class="material-symbols-outlined text-primary">close</span>
            <h2 class="font-headline-lg-mobile text-headline-lg-mobile text-primary">My Urban Journey</h2>
            <span class="material-symbols-outlined text-primary">share</span>
        </header>
        <section class="px-safe-area flex flex-col gap-md">
            <div class="hand-drawn-border p-lg bg-surface-container-high sticker-shadow">
                <h3 class="font-headline-lg text-headline-lg mb-md">今日结算</h3>

                    <div class="h-4 bg-outline-variant w-1/2 rounded"></div>
                    <div class="h-4 bg-outline-variant w-full rounded"></div>
                </div>
            </div>
        </section>
        <footer class="flex flex-col items-center gap-sm p-lg w-full border-t-2 border-dashed border-outline-variant">
            <p class="font-label-caps text-label-caps text-on-surface">Urban Explorer Journal</p>
            <div class="flex gap-md font-body-sm text-body-sm text-on-surface-variant">
                <span>Privacy Policy</span>
                <span>Terms of Play</span>
            </div>
        </footer>
    </main>
    <script>
        // Simple micro-interaction for the "Save Image" button
        const saveBtn = document.querySelector('button.bg-primary-container');
        saveBtn.addEventListener('click', () => {
            const originalText = saveBtn.innerHTML;
            saveBtn.innerHTML = `<span class="material-symbols-outlined animate-spin">refresh</span> 正在生成...`;
            saveBtn.style.opacity = '0.7';

            setTimeout(() => {
                saveBtn.innerHTML = `<span class="material-symbols-outlined text-green-700">check_circle</span> 已保存到相册`;
                saveBtn.classList.remove('bg-primary-container');
                saveBtn.classList.add('bg-surface-container-highest');

                setTimeout(() => {
                    saveBtn.innerHTML = originalText;
                    saveBtn.classList.add('bg-primary-container');
                    saveBtn.classList.remove('bg-surface-container-highest');
                    saveBtn.style.opacity = '1';
                }, 2000);
            }, 1500);
        });

        // Toggle modal visibility for demonstration
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.getElementById('modal-overlay').style.display = 'none';
            }
        });
    </script>
</body>

</html>
