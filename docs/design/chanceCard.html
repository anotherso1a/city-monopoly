<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"

    <style>
        .hand-drawn-border {
            border-style: solid;
            border-width: 2px 2.5px 1.5px 2px;
            border-radius: 4px 8px 3px 10px;
        }

        .paper-texture {
            background-image: radial-gradient(#d5c4ab 0.5px, transparent 0.5px);
            background-size: 12px 12px;
        }

        .ink-shadow {
            box-shadow: 4px 4px 0px 0px rgba(81, 69, 50, 0.15);
        }

        .active-press:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px 0px rgba(0, 0, 0, 0);
        }

        .highlighter-stroke {
            background: linear-gradient(120deg, rgba(255, 186, 0, 0.3) 0%, rgba(255, 186, 0, 0.3) 100%);
            background-repeat: no-repeat;
            background-size: 100% 0.3em;
            background-position: 0 88%;
        }
    </style>

                        "on-primary-fixed": "#271900",
                        "error-container": "#ffdad6",
                        "surface-container-low": "#fff2e1",
                        "inverse-primary": "#ffba20",

                        "primary-fixed-dim": "#ffba20",
                        "on-tertiary-container": "#00577a",
                        "on-secondary-fixed-variant": "#920023",
                        "tertiary": "#00658d",
                        "surface-tint": "#7c5800",

                        "outline-variant": "#d5c4ab",

                        "secondary-fixed": "#ffdad9",
                        "inverse-surface": "#362f24",
                        "surface-container-highest": "#ede1d0",
                        "inverse-on-surface": "#fcefde",
                        "secondary-fixed-dim": "#ffb3b4",
                        "on-surface-variant": "#514532",
                        "on-error": "#ffffff",
                        "on-background": "#211b11",
                        "tertiary-container": "#7dceff",
                        "surface": "#fff8f3",
                        "secondary": "#b71032",
                        "on-tertiary": "#ffffff",
                        "on-surface": "#211b11",
                        "on-error-container": "#93000a",
                        "on-secondary-fixed": "#40000a",
                        "on-primary-container": "#6b4c00",
                        "surface-bright": "#fff8f3",
                        "surface-dim": "#e5d8c8",
                        "primary-container": "#ffb800",

<body class="bg-background text-on-background font-body-md selection:bg-primary-fixed">
   <!-- Overlay Backdrop -->
    <div class="fixed inset-0 bg-on-background/40 backdrop-blur-sm z-[60] flex items-center justify-center p-safe-area">
        <!-- Opportunity Card Popup -->
        <div
            class="w-full max-w-sm bg-surface-container-lowest hand-drawn-border border-on-surface-variant ink-shadow relative overflow-hidden flex flex-col animate-in fade-in zoom-in duration-300">
            <!-- Yellow Header -->
            <div
                class="bg-primary-container px-md py-sm border-b-2 border-on-surface-variant flex items-center justify-center">
                <h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-primary-container tracking-tight">
                    获得机会卡!</h2>
            </div>
            <!-- Card Content -->
            <div class="p-lg flex flex-col items-center gap-md text-center">
                <!-- Illustration Placeholder -->
                <div
                    class="w-32 h-32 hand-drawn-border border-outline-variant bg-surface-container-low flex items-center justify-center rotate-2">
                    <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuBzncUSNd4xsRxZgBD6ChXqbz-aAkuniRFbygIpbkgRldEIYRO5u1vucA-yQYMxuf946d273biYo7d47cuu47p_xnpajcP5uyGb5NmezafE6UsjSOeIFDMF7CiqqU6Z21nq_VVVhWzY1B0egArRFnFr2dHpBFHPtxzHt-oSzw4mNo2qYIlb_jaZAhkfkbRvB3sRMusYkCe8HCQbpUd1SaF_qo-MwIPSVU8ZClAHDrpemjrt8qFzUiXyBJB4qG1bn6p8A_jHwkaOjg"
                        alt="Chance Card Illustration" class="w-full h-full object-contain"></div>
                <div class="space-y-sm">
                    <p class="font-body-md text-on-surface-variant leading-relaxed">
                        在街角捡到了散落的硬币，<br>
                        <span class="font-bold text-primary highlighter-stroke">金币 +50</span>
                    </p>
                </div>
                <!-- Action Button -->
                <button
                    class="w-full mt-base py-md bg-primary-container text-on-primary-container font-headline-lg-mobile text-headline-lg-mobile hand-drawn-border border-on-surface-variant ink-shadow active-press transition-all">
                    收下
                </button>
            </div>
            <!-- Corner Sticker Decoration -->
            <div
                class="absolute -bottom-2 -right-2 w-12 h-12 bg-secondary/10 border-2 border-dashed border-secondary rounded-full -rotate-12 flex items-center justify-center opacity-40">
                <span class="material-symbols-outlined text-secondary text-[20px]">verified</span>
            </div>
        </div>
    </div>
    <script>
        // Micro-interactions for button press feedback and atmospheric delay
        document.querySelectorAll('.active-press').forEach(btn => {
            btn.addEventListener('click', function () {
                this.classList.add('translate-y-0.5', 'translate-x-0.5');
                setTimeout(() => {
                    this.classList.remove('translate-y-0.5', 'translate-x-0.5');
                    // Logic to close popup or trigger next event could go here
                }, 100);
            });
        });

        // Simple visibility toggle for the nav drawer (optional interaction)
        const menuBtn = document.querySelector('header button');
        const drawer = document.getElementById('nav-drawer');
        let drawerOpen = false;

        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            drawerOpen = !drawerOpen;
            drawer.style.transform = drawerOpen ? 'translateX(0)' : 'translateX(100%)';
        });

        document.addEventListener('click', (e) => {
            if (drawerOpen && !drawer.contains(e.target)) {
                drawerOpen = false;
                drawer.style.transform = 'translateX(100%)';
            }
        });
    </script>


</body>

</html>
