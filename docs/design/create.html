<script>
        // Simple Interaction logic for Range buttons
        const rangeButtons = document.querySelectorAll('button.flex-1.flex-col');
        const rangeCircle = document.querySelector('.w-48.h-48');

        rangeButtons.forEach((btn, index) => {
            btn.addEventListener('click', () => {
                // Clear active states
                rangeButtons.forEach(b => {
                    b.classList.remove('bg-primary-container', 'text-on-primary-container', 'border-primary', 'sticker-shadow');
                    b.classList.add('border-outline');
                });
                
                // Add active state to clicked
                btn.classList.remove('border-outline');
                btn.classList.add('bg-primary-container', 'text-on-primary-container', 'border-primary', 'sticker-shadow');

                // Adjust visual circle size
                const sizes = ['w-32 h-32', 'w-48 h-48', 'w-64 h-64'];
                rangeCircle.className = `rounded-full border-4 border-dashed border-primary-container bg-primary-container/20 flex items-center justify-center transition-all duration-500 ease-in-out ${sizes[index]}`;
            });
        });
    </script>
